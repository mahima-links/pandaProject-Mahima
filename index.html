<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panda Project by Mahima</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="main-container">
      <!-- Navbar start -->
      <div class="navbar">
        <div class="left-nav logo">
          <img src="./assets/main-logo.png" alt="Website Logo" />
        </div>
        <div class="right-nav menu">
          <img src="./assets/menu-bar.png" alt="Website Main Menu" />
        </div>
      </div>
      <!-- Navbar end -->

      <!-- Banner Start -->
      <div class="banner-container">
        <div class="left-banner-section">
          <h1>MI LED TV 43" Full HD Smart</h1>
          <p>
            Lorem ipsum, dolor sit amet consectetur adipisicing elit.
            Accusantium quo corrupti nemo quidem dignissimos iste ut dolor
            non?Accusantium quo corrupti nemo quidem dignissimos iste ut dolor
            non? Itaque, beatae. Itaque, beatae.
          </p>
          <h2 class="price">$1250</h2>
          <button class="banner-btn">Buy Now</button>
        </div>
        <div class="right-banner-section">
          <img class="hero-tv" src="./assets/hero-tv.png" alt="" />
        </div>
      </div>

      <!-- Banner end -->

      <div class="category-section">
        <h1 class="category-heading">Catagories</h1>
        <div class="cards">
          <div class="card watch">
            <h1>Watch</h1>
            <img src="./assets/category-watch.png" alt="" />
          </div>
          <div class="card bag">
            <h1>Bag</h1>
            <img src="./assets/category-bag.png" alt="" />
          </div>
          <div class="card shoe">
            <h1>Shoe</h1>
            <img src="./assets/category-shoe.png" alt="" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
